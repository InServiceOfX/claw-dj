<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>claw-dj playlist</title>
  <style>
    :root { color-scheme: light; --ink:#171717; --muted:#696969; --line:#d8d8d3; --paper:#f7f7f3; --panel:#fff; --green:#176b4d; --red:#a53a2a; --focus:#2367b1; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--paper); color:var(--ink); font:14px/1.4 ui-sans-serif,system-ui,sans-serif; letter-spacing:0; }
    header { min-height:64px; display:flex; align-items:center; justify-content:space-between; gap:20px; padding:12px 24px; background:#171717; color:white; }
    h1 { margin:0; font-size:20px; font-weight:700; letter-spacing:0; }
    .brand span { color:#78d7ac; }
    .summary { color:#d0d0ca; font-variant-numeric:tabular-nums; }
    main { padding:18px 24px 28px; max-width:1500px; margin:auto; }
    .toolbar { display:grid; grid-template-columns:minmax(220px,1fr) minmax(160px,220px) auto auto auto auto; gap:8px; margin-bottom:12px; }
    input,select,button { min-height:38px; border:1px solid var(--line); border-radius:4px; background:white; color:var(--ink); font:inherit; padding:7px 10px; }
    button { cursor:pointer; font-weight:650; }
    button:hover { border-color:#85857f; }
    button:focus,input:focus,select:focus { outline:2px solid var(--focus); outline-offset:1px; }
    button.primary { background:var(--green); border-color:var(--green); color:white; }
    .modes { display:flex; }
    .modes button { border-radius:0; margin-left:-1px; }
    .modes button:first-child { border-radius:4px 0 0 4px; margin-left:0; }
    .modes button:last-child { border-radius:0 4px 4px 0; }
    .modes button.active { background:#deded8; }
    .workspace { display:grid; grid-template-columns:minmax(0,1fr) minmax(320px,36%); border:1px solid var(--line); background:var(--panel); min-height:650px; }
    section { min-width:0; }
    section + section { border-left:1px solid var(--line); }
    .section-head { height:48px; padding:0 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); }
    h2 { margin:0; font-size:15px; letter-spacing:0; }
    .count,.meta { color:var(--muted); font-variant-numeric:tabular-nums; }
    .rows { height:600px; overflow:auto; }
    .track { min-height:58px; display:grid; grid-template-columns:30px minmax(0,1fr) 64px 46px; align-items:center; gap:8px; padding:7px 12px; border-bottom:1px solid #ecece8; }
    .track:hover { background:#f4f6f2; }
    .track input { width:17px; min-height:17px; accent-color:var(--green); }
    .title,.artist { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .title { font-weight:650; }
    .artist { color:var(--muted); font-size:13px; }
    .bpm,.key { text-align:right; font-variant-numeric:tabular-nums; }
    .missing { color:var(--red); }
    .empty { padding:30px 18px; color:var(--muted); text-align:center; }
    .notice { min-height:24px; margin-top:10px; color:var(--muted); }
    .ingest { display:flex; align-items:center; justify-content:space-between; gap:18px; padding:14px; margin-bottom:12px; border:1px solid var(--line); background:var(--panel); }
    .ingest h2 { margin-bottom:3px; }
    .ingest-detail { color:var(--muted); }
    .brain { padding:14px; margin-bottom:12px; border:1px solid var(--line); background:var(--panel); }
    .brain h2 { margin-bottom:3px; }
    .brain-form { display:grid; grid-template-columns:minmax(240px,1fr) 190px 70px auto; gap:8px; margin-top:10px; }
    .brain-detail { color:var(--muted); min-height:20px; margin-top:8px; }
    .picks { margin-top:8px; border-top:1px solid var(--line); }
    .pick { display:grid; grid-template-columns:26px minmax(0,1fr); align-items:center; gap:8px; padding:6px 2px; border-bottom:1px solid #ecece8; }
    .pick input { width:16px; min-height:16px; accent-color:var(--green); }
    .pick .already { color:var(--muted); font-size:12px; }
    .picks-actions { margin-top:10px; display:flex; gap:8px; }
    @media (max-width:850px) { .brain-form { grid-template-columns:1fr; } }
    @media (max-width:850px) {
      header { align-items:flex-start; padding:12px 14px; }
      main { padding:12px; }
      .toolbar { grid-template-columns:1fr 1fr; }
      .toolbar input { grid-column:1 / -1; }
      .workspace { grid-template-columns:1fr; }
      section + section { border-left:0; border-top:1px solid var(--line); }
      .rows { height:48vh; }
    }
  </style>
</head>
<body>
  <header><div class="brand"><h1><span>claw</span>-dj playlist</h1></div><div class="summary" id="summary">Loading crate...</div></header>
  <main>
    <div class="ingest">
      <div><h2>New music</h2><div class="ingest-detail" id="ingest-detail">Checking the library index…</div></div>
      <button id="scan">Check for new music</button>
    </div>
    <div class="brain">
      <h2>Ask the DJ brain</h2>
      <div class="ingest-detail">Describe the set you want; an agent picks candidates from the new music. You review before anything is added.</div>
      <div class="brain-form">
        <input id="brief" type="text" placeholder="e.g. recognizable 90s/2000s hits that mix with the current showcase" aria-label="Brief for the agent">
        <select id="engine" aria-label="Agent engine">
          <option value="both">Both engines</option>
          <option value="nemoclaw">NemoClaw · Nemotron</option>
          <option value="h-agent">H Company · Holo</option>
        </select>
        <input id="pick-count" type="number" min="3" max="50" value="20" aria-label="How many picks">
        <button id="ask" class="primary">Ask</button>
      </div>
      <div class="brain-detail" id="brain-detail"></div>
      <div class="picks" id="picks" hidden></div>
      <div class="picks-actions" id="picks-actions" hidden>
        <button id="apply-picks" class="primary">Add checked to set</button>
        <button id="clear-picks">Dismiss</button>
      </div>
    </div>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Search title, artist, or path" aria-label="Search tracks">
      <select id="artist" aria-label="Filter by artist"><option value="">All artists</option></select>
      <div class="modes" aria-label="Analysis status">
        <button class="active" data-analysis="all">All</button><button data-analysis="analyzed">Analyzed</button><button data-analysis="missing">Missing BPM</button>
      </div>
      <button id="seed">Add researched hits</button>
      <button id="mixorder" title="Reorder enabled set by BPM/key/sample lineage — never drops your picks">Order for mixes</button>
      <button id="suggest" title="Analyzed library tracks that blend with the current set (mix-graph score)">Suggest blends</button>
      <button id="export" class="primary" title="Lock in the current set: writes the .m3u8 + json Mixxx imports">Finalize for Mixxx</button>
    </div>
    <div class="workspace">
      <section>
        <div class="section-head"><h2>Library</h2><span class="count" id="library-count"></span></div>
        <div class="rows" id="library"></div>
      </section>
      <section>
        <div class="section-head"><h2>Enabled set</h2><span class="count" id="set-count"></span></div>
        <div class="rows" id="selected"></div>
      </section>
    </div>
    <div class="notice" id="notice"></div>
  </main>
  <script>
    const state = { analysis:'all', meta:null };
    const el = id => document.getElementById(id);
    const esc = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    async function api(path, options) { const response = await fetch(path, options); const data = await response.json(); if (!response.ok) throw new Error(data.error || response.statusText); return data; }
    function row(track) {
      const bpm = track.bpm ? Number(track.bpm).toFixed(1) : '—';
      return `<label class="track" title="${esc(track.track_id)}"><input type="checkbox" data-id="${esc(track.track_id)}" ${track.enabled?'checked':''}><span><div class="title">${esc(track.title)}</div><div class="artist">${esc(track.artist)}</div></span><span class="bpm ${track.bpm?'':'missing'}">${bpm}</span><span class="key">${esc(track.key || '—')}</span></label>`;
    }
    async function loadMeta() {
      const currentArtist = el('artist').value;
      state.meta = await api('/api/meta');
      el('summary').textContent = `${state.meta.track_count.toLocaleString()} tracks · ${state.meta.analyzed_count.toLocaleString()} library analyzed · ${state.meta.selected_analyzed_count}/${state.meta.selected_count} set analyzed`;
      el('set-count').textContent = state.meta.selected_count;
      el('artist').innerHTML = '<option value="">All artists</option>' + state.meta.artists.map(a => `<option>${esc(a)}</option>`).join('');
      el('artist').value = currentArtist;
    }
    async function loadIngest() {
      const data = await api('/api/ingest');
      const roots = (data.roots || []).map(path => path.split('/').pop()).join(' + ');
      if (data.error) el('ingest-detail').textContent = `Scan failed: ${data.error}`;
      else if (data.running) el('ingest-detail').textContent = `Scanning ${roots || 'configured folders'}… ${data.processed || 0}/${data.discovered || '?'} files`;
      else if (data.finished_at) el('ingest-detail').textContent = `${data.new_count} new · ${data.changed_count} changed · ${data.unchanged_count} unchanged · ${data.untagged_count} need tags`;
      else el('ingest-detail').textContent = roots ? `Ready to scan ${roots}` : 'Configure music folders with the scan command once.';
      el('scan').disabled = Boolean(data.running);
      return data;
    }
    async function loadLibrary() {
      const params = new URLSearchParams({q:el('search').value,artist:el('artist').value,analysis:state.analysis});
      const data = await api('/api/tracks?' + params);
      el('library-count').textContent = data.truncated ? `${data.total.toLocaleString()} matches · first ${data.tracks.length}` : `${data.total.toLocaleString()} matches`;
      el('library').innerHTML = data.tracks.length ? data.tracks.map(row).join('') : '<div class="empty">No matching tracks</div>';
    }
    async function loadSelected() {
      const data = await api('/api/tracks?selected=1&limit=1000');
      el('selected').innerHTML = data.tracks.length ? data.tracks.map(row).join('') : '<div class="empty">Enable tracks from the library or add the researched hits.</div>';
    }
    async function toggle(event) {
      const box = event.target.closest('input[data-id]'); if (!box) return;
      await api('/api/selection',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({track_id:box.dataset.id,enabled:box.checked})});
      await Promise.all([loadMeta(),loadLibrary(),loadSelected()]);
    }
    let timer;
    el('search').addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(loadLibrary,180)});
    el('artist').addEventListener('change',loadLibrary);
    document.querySelector('.modes').addEventListener('click',event=>{const button=event.target.closest('button');if(!button)return;document.querySelectorAll('.modes button').forEach(b=>b.classList.toggle('active',b===button));state.analysis=button.dataset.analysis;loadLibrary()});
    el('library').addEventListener('change',toggle); el('selected').addEventListener('change',toggle);
    el('seed').addEventListener('click',async()=>{const result=await api('/api/seed',{method:'POST'});el('notice').textContent=`Matched ${result.matched} researched tracks. ${result.unmatched.length} still missing from the scanned crate.`;await Promise.all([loadMeta(),loadLibrary(),loadSelected()])});
    el('mixorder').addEventListener('click',async()=>{const result=await api('/api/mix-order',{method:'POST'});el('notice').textContent=result.message || `Reordered ${result.count} tracks (mean mix score ${result.mean_score}).`;await Promise.all([loadMeta(),loadLibrary(),loadSelected()])});
    el('export').addEventListener('click',async()=>{
      const button=el('export');const original=button.textContent;button.disabled=true;
      try{
        const result=await api('/api/export',{method:'POST'});
        button.textContent=`✓ Finalized ${result.count} tracks`;
        el('notice').textContent=`Finalized ${result.count} tracks — ${result.m3u} is ready. Next: uv run python -m brain.enrich_set (bpm/key, lyrics, chroma, phrase cues), then build the mix.`;
      }catch(error){button.textContent='Finalize failed';el('notice').textContent=error.message;}
      setTimeout(()=>{button.textContent=original;button.disabled=false;},4000);
    });
    const ENGINE_NAMES = {'nemoclaw':'NemoClaw · Nemotron','h-agent':'H Company · Holo','mix-graph':'Mix-graph (deterministic)','both':'both engines'};
    function pickRow(pick) {
      const already = pick.enabled ? ' <span class="already">already in set</span>' : '';
      const excluded = pick.excluded ? ' <span class="already">you removed this earlier</span>' : '';
      const missing = pick.in_library ? '' : ' <span class="already">not in crate</span>';
      const blend = pick.blends_with ? ` <span class="already">↔ ${esc(pick.blends_with)} (${pick.score})</span>` : '';
      const checked = pick.enabled || !pick.in_library || pick.excluded ? '' : 'checked';
      const disabled = pick.enabled || !pick.in_library ? 'disabled' : '';
      return `<label class="pick"><input type="checkbox" data-pick="${esc(pick.track_id)}" ${checked} ${disabled}><span><span class="title">${esc(pick.title)}</span> <span class="artist">— ${esc(pick.artist)}</span>${blend}${already}${excluded}${missing}</span></label>`;
    }
    function renderResults(results) {
      const engines = Object.keys(results || {});
      const total = engines.reduce((n, e) => n + (results[e].picks || []).length, 0);
      el('picks').hidden = el('picks-actions').hidden = total === 0;
      el('picks').innerHTML = engines.map(engine => {
        const data = results[engine];
        const head = `<div class="pick" style="border-bottom:2px solid var(--line)"><span></span><span><span class="title">${esc(ENGINE_NAMES[engine] || engine)}</span> <span class="artist">— ${(data.picks||[]).length} picks · “${esc(data.brief || '')}”</span></span></div>`;
        return head + (data.picks || []).map(pickRow).join('');
      }).join('');
    }
    async function pollBrain() {
      const data = await api('/api/brain');
      if (data.running) { el('brain-detail').textContent = `Asking ${ENGINE_NAMES[data.engine] || data.engine}… (each agent turn takes 1–7 minutes)`; return data; }
      const total = Object.values(data.results || {}).reduce((n, d) => n + (d.picks || []).length, 0);
      el('brain-detail').textContent = data.error ? `Agent call failed: ${data.error}` : (total ? 'Latest agent results below (cached across restarts). Uncheck anything you don\'t want, then add.' : '');
      renderResults(data.results);
      el('ask').disabled = false;
      return data;
    }
    el('ask').addEventListener('click',async()=>{
      const brief = el('brief').value.trim();
      if (!brief) { el('brain-detail').textContent = 'Write a brief first — what kind of set do you want?'; return; }
      el('ask').disabled = true; el('picks').hidden = el('picks-actions').hidden = true;
      await api('/api/brain/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({brief,engine:el('engine').value,count:Number(el('pick-count').value)||20})});
      const poll = setInterval(async()=>{const status=await pollBrain();if(!status.running)clearInterval(poll)},2000);
      await pollBrain();
    });
    el('apply-picks').addEventListener('click',async()=>{
      const ids=[...document.querySelectorAll('#picks input[data-pick]:checked')].map(box=>box.dataset.pick);
      if(!ids.length){el('brain-detail').textContent='Nothing checked to add.';return;}
      const result=await api('/api/brain/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({track_ids:ids})});
      el('notice').textContent=`Added ${result.added} agent picks to the set (${result.selected_count} total). Analyze new tracks in Mixxx before performing.`;
      el('picks').hidden=el('picks-actions').hidden=true;el('brain-detail').textContent='';
      await Promise.all([loadMeta(),loadLibrary(),loadSelected()]);
    });
    el('clear-picks').addEventListener('click',()=>{el('picks').hidden=el('picks-actions').hidden=true;el('brain-detail').textContent='';});
    el('suggest').addEventListener('click',async()=>{
      el('brain-detail').textContent='Scoring analyzed library tracks against the current set…';
      const data=await api('/api/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({limit:20})});
      renderResults({'mix-graph':data});
      el('brain-detail').textContent=`Mix-graph scored ${data.candidates_considered} analyzed candidates against your ${state.meta.selected_count}-track set. These respect your removals.`;
    });
    el('scan').addEventListener('click',async()=>{await api('/api/ingest/scan',{method:'POST'});el('notice').textContent='Looking for new or changed music. Existing files will not be reopened.';const poll=setInterval(async()=>{const status=await loadIngest();if(!status.running){clearInterval(poll);await Promise.all([loadMeta(),loadLibrary(),loadSelected()]);el('notice').textContent=status.error?`Scan failed: ${status.error}`:`Found ${status.new_count} new and ${status.changed_count} changed tracks.`}},750)});
    (async()=>{await Promise.all([loadMeta(),loadIngest()]);await Promise.all([loadLibrary(),loadSelected()]);const brain=await pollBrain();if(brain.running){const poll=setInterval(async()=>{const status=await pollBrain();if(!status.running)clearInterval(poll)},2000);}})().catch(error=>{el('notice').textContent=error.message});
  </script>
</body>
</html>
